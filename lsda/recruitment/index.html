<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Recruitment formats Generator</title>

    <link rel="icon" href="/lsda/favicon.ico" type="image/x-icon"/>

    <link rel="stylesheet" href="/lsda/common.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.1/css/fontawesome.min.css">
    <style>
        .selector {
            margin-right: 20px;
        }

        .request {
            display: none;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />


</head>

<body>
    <header
        style="background-color: var(--template-color); color:var(--contrast-color); text-align: center; width: 100vw; font-size: larger; font-weight: bolder;">
        Recruitment formats Generator</header>
    <div style="padding:25px;">
        <div class="row">
            <div class="col-3 form-group"><span class="form-label">Applicant's name:</span><input type="text" id="name"
                    class="form-control"></div>

            <div class="col-3 form-group"><span class="form-label">Prosecutors's name:</span><input type="text" id="handler" onchange="changeName()"
                class="form-control"></div>
    
            <div class="col-3 form-group"><span class="form-label">Rank:</span><select name="rank" id="rank"
                    class="form-control s2"></select></div>


        </div>
        <div class="row">
            <div class="col-3 form-group"><span class="form-label">Format:</span><select name="format" id="format"
                class="form-control s2"></select></div>

        </div>

        <div class="row">
            <div class="col-12 form-group"><span class="form-label">Reasons: <i>(Place each reason on its own line. )</i></span>
                <textarea class="form-control" id="reasons" style="min-height:200px; width: 100%;"></textarea>
            </div>
        </div>
        <!-- Submit -->
        <div class="row">
            <div class="col-3">
                <button class="btn btn-success form-control" onclick="generate()">Generate</button><br><br>
                <button class="btn btn-danger form-control" onclick="copy()">Copy</button>
                <br><br>
                <div class="row">
                </div>
            </div>
            <div class="col-9">
                <textarea id="result" class="form-control" style="width: 100%; min-height: 100%;" readonly></textarea>
            </div>
        </div>

        <!-- Including Bootstrap JS (with its jQuery dependency) so that dynamic components work -->
        <script src="https://code.jquery.com/jquery-1.12.4.min.js"
            integrity="sha256-ZosEbRLbNQzLpnKIkEdrPv7lOy9C27hHQ+Xp8a4MxAQ=" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
        <script src="/faction_ranks.js"></script>
        <script src="/lsda/recruitment/formats.js"></script>

        <script>
            const fRanks = faction_ranks["District Attorney's Office"];
            Object.entries(fRanks).forEach(rank => {
                let child = document.createElement("option");
                child.value = rank[0];
                child.innerText = rank[1];
                document.querySelector("#rank").appendChild(child);
            });
            Object.entries(formats).forEach((value) => {
                let child = document.createElement("option");
                child.value = value[0];
                child.innerText = value[1].title;
                document.querySelector("#format").appendChild(child);
            });

            const formatCodes = {};
            function getFormatCode(id) {
                return new Promise(async (resolve, reject) =>  {
                    if(formatCodes[id] != undefined) return resolve(formatCodes[id]);
                    let f = await fetch(`/lsda/recruitment/formats/${id}.bb`);
                    formatCodes[id] = await f.text();
                    resolve(formatCodes[id]);
                })
            }


            async function generate() {
                let formatId = $('#format').val();
                let format = formats[formatId];
                console.log(format);
                
                o = (await getFormatCode("A_header"))+(await getFormatCode(format.code))+(await getFormatCode("A_footer"));
                const replaces = {
                    "%CAND_NAME%": $('#name').val(),
                    "%CAND_LNAME%": $('#name').val().split(" ")[1],
                    "%HAND_NAME%": $('#handler').val(),
                    "%HAND_RANK%": fRanks[$('#rank').val()],
                    "%PTITLE%": format.ptitle,
                    "%REASONS%": "[*]"+$('#reasons').val().replaceAll(`\n`, `\n[*]`)
                };
                Object.entries(replaces).forEach(x=> {
                    o = o.replaceAll(x[0], x[1])
                });
                

                $('#result').val(o);
            }

            function copy() {
                navigator.clipboard.writeText($('#result').val()).then(
                    () => {
                        console.log('clipboard successfully set');
                    },
                    () => {
                        console.error('clipboard write failed');
                    }
                );

            }
            $('.s2').select2({
                theme: 'bootstrap-5'
            });
            var a;


            function toggleHeader(btn) {

                if (btn.classList.contains("btn-secondary")) {
                    //Pasa a no urgente
                    btn.innerText = "Header";
                    btn.classList.remove("btn-secondary");
                    btn.classList.add("btn-primary");
                } else {
                    //Pasa a urgent. 
                    btn.innerText = "Body";
                    btn.classList.add("btn-secondary");
                    btn.classList.remove("btn-primary");

                }
            }

            function getDate() {
                const d = new Date();
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"]
                return d.getDay()+"/"+months[d.getMonth()-1]+"/"+d.getFullYear();
            }

            var prev = 1;
            $('#format').on('change', function(e) {
                let formatId = $('#format').val();
                let format = formats[formatId];
                if(format.defReason || (formats[prev].defReason && $('#reasons').html() == formats[prev].defReason)) {
                    $('#reasons').html(format.defReason || "");
                }

                prev = formatId;
                getFormatCode(format.code); //Already cache it
            });

            function changeName() {
                localStorage.setItem("handler_name", $('#handler').val());
            }
            $('#rank').on('select2:select', function(e) {
                localStorage.setItem("handler_rank", $('#rank').val());
            });


            if(localStorage.getItem("handler_name")) {
                $('#handler').val(localStorage.getItem("handler_name"))
            }
            if(localStorage.getItem("handler_rank")) {
                $('#rank').val(localStorage.getItem("handler_rank")).trigger('change'); 
            }

        </script>
</body>

</html>
