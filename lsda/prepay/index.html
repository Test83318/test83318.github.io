<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepay</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

</head>

<body>
    <h1>Personal tool to facilitate payments</h1>

    <div class="row">
        <div class="col-2">
            <div class="form-group">
                <label for="period">Period:</label>
                <input type="text" id="period" class="form-control">
                <div id="suma" style="font-weight: bold;"></div>
            </div>
            <a href="./scripts.js">SEE HERE</a>
            <button onclick="process()" class="form-control btn btn-primary">Process</button>
            <button onclick="download()" id="download" style="display: none" class="form-control btn btn-primary">Download</button>

        </div>
        <div class="col-5">
            <span>Input:</span>
            <textarea name="input" class="form-control"  id="input"></textarea>
        </div>
        <div class="col-5">
            <span>Output:</span>
            <textarea name="output" class="form-control"  readonly id="output"></textarea>
        </div>
    </div>
    <br>
    <div class="alert alert-warning" id="repes" style="display: none;"><b>WARNING: </b>
        The following routings are being paid more than once: 
        <ul>
            <li>TEST</li>
        </ul>
    </div>

    
    <br>

    

    <script>
        const input = document.querySelector('#input');
        const output = document.querySelector('#output');
        const per = document.querySelector('#period');
        const suma = document.querySelector('#suma');
        const repes = document.querySelector('#repes');
        const d = new Date();
        var str = "";

        function process() {
            S = 0;
            paidRoutings = new Set();
            repRoutings = new Set();
            var data = input.value.split("\n").map(x=> {
                y = x.split(/\t|&/);
                /* Routing | Amount | Comment*/
                if(!y[1]) return null;

                if(y[0].length != '9') y[0] = '0'+y[0];
                if(paidRoutings.has(y[0])) repRoutings.add(y[0]);
                else paidRoutings.add(y[0]);
                y[2] = y[2].replaceAll("[P]", per.value)
                S += parseInt(y[1]);
                return y
            }).filter(x=>x).map(x=> {
                return x.join(',')
            }).join("\n");
            
            // for (const [key, value] of Object.entries(replaces)) {
            //     data = data.replaceAll(key, value);
            // }
            // data = data.replaceAll("[P]", document.querySelector('#period').value)
            output.value = "destination_routing,amount,comment\n"+data;
            str = "destination_routing,amount,comment\n"+data;
            document.querySelector('#download').style.display = "block"


            suma.innerHTML = `**${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}** <br>
Balance: -${S}<br>
Reason: Wages (${per.value})`;


            /*Procesar repetidos*/
            if(repRoutings.size != 0) {
                Array.from(repes.querySelectorAll('li')).forEach(x=> x.remove());
                for(let item of repRoutings) {
                    li = document.createElement('li');
                    li.innerHTML = item;
                    repes.querySelector('ul').appendChild(li);
                }
                repes.style.display = "block";
            } else repes.style.display = "none";
        }

        function getMonth(dat = d) {
            return dat.toLocaleString('en', { month: 'long' });
        }
        function autoPeriod() {

            wDay = d.getDay(); //Día de la semana, 0 si domingo
            if(wDay == 0) wDay = 7;

            day = d.getDate();
            return getMonth() + " " + (day-wDay) + "-" + (day + wDay-7); //-5/02/20xx, check it.
            // De momento así
        }


        function download() {
            var hidden = document.createElement('a');
            hidden.href = 'data:text/csv;charset=utf-8,'+encodeURI(str);
            hidden.download = `${getMonth()}${d.getDate()}.csv`;
            hidden.target = '_blank';
            hidden.click();
        }
        per.value = autoPeriod();
    </script>
</body>

</html>
</body>

</html>
